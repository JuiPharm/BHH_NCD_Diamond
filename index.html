<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDMS Location Consent</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(220, 38, 38, 0.25), transparent 30%),
        radial-gradient(circle at bottom left, rgba(37, 99, 235, 0.22), transparent 35%),
        linear-gradient(135deg, #0f172a, #1e3a8a, #dc2626);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 30px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
      padding: 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 7px;
      background: linear-gradient(90deg, #dc2626, #ffffff, #2563eb);
    }

    .lang-toggle {
      position: absolute;
      top: 18px;
      right: 18px;
      display: flex;
      gap: 6px;
      background: #f1f5f9;
      border-radius: 999px;
      padding: 4px;
      border: 1px solid #e2e8f0;
    }

    .lang-toggle button {
      margin: 0;
      padding: 7px 11px;
      border-radius: 999px;
      border: none;
      font-size: 12px;
      box-shadow: none;
      background: transparent;
      color: #334155;
      cursor: pointer;
    }

    .lang-toggle button.active {
      background: linear-gradient(135deg, #dc2626, #2563eb);
      color: white;
      font-weight: bold;
    }

    .logo-wrap {
      width: 136px;
      height: 136px;
      margin: 28px auto 16px;
      border-radius: 32px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.15);
      border: 2px solid #e5e7eb;
    }

    .logo {
      width: 106px;
      height: 106px;
      object-fit: contain;
    }

    h1 {
      margin: 8px 0;
      font-size: 26px;
      color: #0f172a;
    }

    p {
      color: #475569;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 18px;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 16px;
      font-weight: bold;
      color: #0f172a;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px;
      margin-top: 7px;
      border: 1px solid #cbd5e1;
      border-radius: 15px;
      font-size: 16px;
      outline: none;
      background: #ffffff;
    }

    input[type="text"]:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .choice {
      margin-top: 12px;
      text-align: left;
      background: linear-gradient(145deg, #ffffff, #f8fafc);
      padding: 15px;
      border-radius: 18px;
      border: 1px solid #dbeafe;
    }

    .choice label {
      margin: 10px 0;
      font-weight: normal;
      display: flex;
      gap: 10px;
      align-items: center;
      color: #1e293b;
    }

    input[type="radio"] {
      accent-color: #dc2626;
      transform: scale(1.15);
    }

    .notice {
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(145deg, #eff6ff, #ffffff);
      color: #1e3a8a;
      font-size: 13px;
      line-height: 1.6;
      text-align: left;
      border-left: 5px solid #dc2626;
    }

    button.submit-btn {
      width: 100%;
      margin-top: 24px;
      padding: 15px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #dc2626, #2563eb);
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
    }

    button.submit-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      box-shadow: none;
    }

    .status {
      margin-top: 16px;
      padding: 13px;
      border-radius: 15px;
      display: none;
      font-size: 14px;
      line-height: 1.5;
    }

    .success {
      display: block;
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    .error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .loading {
      display: block;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px;
        border-radius: 24px;
      }

      h1 {
        font-size: 23px;
      }

      .logo-wrap {
        width: 120px;
        height: 120px;
      }

      .logo {
        width: 92px;
        height: 92px;
      }
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="lang-toggle">
      <button type="button" id="btnTh" class="active" onclick="setLanguage('th')">TH</button>
      <button type="button" id="btnEn" onclick="setLanguage('en')">EN</button>
    </div>

    <div class="logo-wrap">
      <img
        class="logo"
        src="https://lh3.googleusercontent.com/d/1r7PM1ogHIbxskvcauVIYaQOfSHXWGncO=w240"
        alt="Logo"
      />
    </div>

    <h1 data-i18n="title">Location Consent</h1>

    <p data-i18n="description">
      กรุณากรอกข้อมูลและให้ความยินยอมในการบันทึกตำแหน่ง GPS
      เพื่อใช้เป็นข้อมูลสำหรับให้ความช่วยเหลือในกรณีฉุกเฉิน
    </p>

    <form id="locationForm">
      <label data-i18n="firstNameLabel">ชื่อ</label>
      <input
        type="text"
        id="firstName"
        placeholder="กรอกชื่อ"
        data-i18n-placeholder="firstNamePlaceholder"
        required
      />

      <label data-i18n="lastNameLabel">นามสกุล</label>
      <input
        type="text"
        id="lastName"
        placeholder="กรอกนามสกุล"
        data-i18n-placeholder="lastNamePlaceholder"
        required
      />

      <label data-i18n="consentLabel">ความยินยอม</label>

      <div class="choice">
        <label>
          <input type="radio" name="consent" value="ยินยอม" required />
          <span data-i18n="consentYes">ยินยอมให้บันทึกตำแหน่ง GPS</span>
        </label>

        <label>
          <input type="radio" name="consent" value="ไม่ยินยอม" required />
          <span data-i18n="consentNo">ไม่ยินยอมให้บันทึกตำแหน่ง GPS</span>
        </label>
      </div>

      <div class="notice" data-i18n="notice">
        สิทธิประโยชน์สำหรับผู้ถือบัตร NCD Diamond Card
      </div>

      <button type="submit" id="submitBtn" class="submit-btn" data-i18n="submitBtn">
        ส่งข้อมูล
      </button>

      <div id="status" class="status"></div>
    </form>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyOi97FkTX8EQ-riUkm3rCL0jET2P6iJWyntOcmP1ACOavxUM5LFMz8PH_D2Ctkc4RV8g/exec';

    let currentLang = 'th';

    const i18n = {
      th: {
        title: 'Location Consent',
        description: 'กรุณากรอกข้อมูลและให้ความยินยอมในการบันทึกตำแหน่ง GPS เพื่อใช้เป็นข้อมูลสำหรับให้ความช่วยเหลือในกรณีฉุกเฉิน',
        firstNameLabel: 'ชื่อ',
        firstNamePlaceholder: 'กรอกชื่อ',
        lastNameLabel: 'นามสกุล',
        lastNamePlaceholder: 'กรอกนามสกุล',
        consentLabel: 'ความยินยอม',
        consentYes: 'ยินยอมให้บันทึกตำแหน่ง GPS',
        consentNo: 'ไม่ยินยอมให้บันทึกตำแหน่ง GPS',
        notice: 'สิทธิประโยชน์สำหรับผู้ถือบัตร NCD Diamond Card',
        submitBtn: 'ส่งข้อมูล',
        saving: 'กำลังบันทึก...',
        locating: 'กำลังค้นหาตำแหน่ง...',
        locatingStatus: 'กำลังค้นหาตำแหน่ง GPS...',
        required: 'กรุณากรอกข้อมูลให้ครบถ้วน',
        saved: 'บันทึกข้อมูลเรียบร้อย',
        gpsNotSupported: 'อุปกรณ์นี้ไม่รองรับ GPS',
        locationError: 'ไม่สามารถดึงตำแหน่งได้',
        permissionDenied: 'ผู้ใช้ไม่อนุญาตให้เข้าถึงตำแหน่ง',
        timeout: 'ค้นหาตำแหน่งไม่ทันเวลา กรุณาลองใหม่',
        unavailable: 'ไม่พบสัญญาณ GPS',
        accuracySaved: 'บันทึกข้อมูลเรียบร้อย Accuracy ประมาณ {accuracy} เมตร'
      },
      en: {
        title: 'Location Consent',
        description: 'Please enter your information and provide consent to record your GPS location for emergency assistance purposes.',
        firstNameLabel: 'First Name',
        firstNamePlaceholder: 'Enter first name',
        lastNameLabel: 'Last Name',
        lastNamePlaceholder: 'Enter last name',
        consentLabel: 'Consent',
        consentYes: 'I consent to record my GPS location',
        consentNo: 'I do not consent to record my GPS location',
        notice: 'Benefits for NCD Diamond Card holders',
        submitBtn: 'Submit',
        saving: 'Saving...',
        locating: 'Locating...',
        locatingStatus: 'Searching for GPS location...',
        required: 'Please complete all required fields',
        saved: 'Data saved successfully',
        gpsNotSupported: 'This device does not support GPS',
        locationError: 'Unable to retrieve location',
        permissionDenied: 'Location permission was denied',
        timeout: 'Location request timed out. Please try again',
        unavailable: 'GPS signal unavailable',
        accuracySaved: 'Data saved successfully. Accuracy approximately {accuracy} meters'
      }
    };

    const form = document.getElementById('locationForm');
    const statusBox = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    function t(key) {
      return i18n[currentLang][key] || key;
    }

    function setLanguage(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.textContent = t(key);
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        el.placeholder = t(key);
      });

      document.getElementById('btnTh').classList.toggle('active', lang === 'th');
      document.getElementById('btnEn').classList.toggle('active', lang === 'en');

      clearStatus();
      resetButton();
    }

    form.addEventListener('submit', async function(event) {
      event.preventDefault();

      clearStatus();
      submitBtn.disabled = true;

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const consent = document.querySelector('input[name="consent"]:checked')?.value;
      const deviceInfo = getDeviceInfo();

      if (!firstName || !lastName || !consent) {
        showStatus(t('required'), 'error');
        resetButton();
        return;
      }

      if (consent === 'ไม่ยินยอม') {
        submitBtn.textContent = t('saving');

        await submitToGoogleSheet({
          firstName,
          lastName,
          consent,
          latitude: '',
          longitude: '',
          accuracy: '',
          ...deviceInfo
        });

        showStatus(t('saved'), 'success');
        form.reset();
        resetButton();
        return;
      }

      if (!navigator.geolocation) {
        showStatus(t('gpsNotSupported'), 'error');
        resetButton();
        return;
      }

      showStatus(t('locatingStatus'), 'loading');
      submitBtn.textContent = t('locating');

      navigator.geolocation.getCurrentPosition(
        async function(position) {
          submitBtn.textContent = t('saving');

          await submitToGoogleSheet({
            firstName,
            lastName,
            consent,
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
            accuracy: position.coords.accuracy,
            ...deviceInfo
          });

          showStatus(
            t('accuracySaved').replace('{accuracy}', Math.round(position.coords.accuracy)),
            'success'
          );

          form.reset();
          resetButton();
        },

        function(error) {
          let message = t('locationError');

          if (error.code === error.PERMISSION_DENIED) {
            message = t('permissionDenied');
          } else if (error.code === error.TIMEOUT) {
            message = t('timeout');
          } else if (error.code === error.POSITION_UNAVAILABLE) {
            message = t('unavailable');
          }

          showStatus(message, 'error');
          resetButton();
        },

        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    });

    function getDeviceInfo() {
      const ua = navigator.userAgent;

      let browser = 'Unknown';
      let os = 'Unknown';
      let deviceType = 'Desktop';

      if (ua.includes('Edg')) {
        browser = 'Microsoft Edge';
      } else if (ua.includes('OPR') || ua.includes('Opera')) {
        browser = 'Opera';
      } else if (ua.includes('Chrome')) {
        browser = 'Google Chrome';
      } else if (ua.includes('Safari')) {
        browser = 'Safari';
      } else if (ua.includes('Firefox')) {
        browser = 'Firefox';
      }

      if (ua.includes('Windows')) {
        os = 'Windows';
      } else if (ua.includes('Android')) {
        os = 'Android';
        deviceType = 'Mobile';
      } else if (ua.includes('iPhone')) {
        os = 'iPhone iOS';
        deviceType = 'Mobile';
      } else if (ua.includes('iPad')) {
        os = 'iPadOS';
        deviceType = 'Tablet';
      } else if (ua.includes('Mac')) {
        os = 'macOS';
      } else if (ua.includes('Linux')) {
        os = 'Linux';
      }

      return {
        deviceType: deviceType,
        os: os,
        browser: browser,
        platform: navigator.platform || '',
        language: navigator.language || '',
        screenResolution: `${screen.width}x${screen.height}`,
        rawUserAgent: ua
      };
    }

    async function submitToGoogleSheet(data) {
      const formData = new URLSearchParams();

      formData.append('firstName', data.firstName);
      formData.append('lastName', data.lastName);
      formData.append('consent', data.consent);
      formData.append('latitude', data.latitude);
      formData.append('longitude', data.longitude);
      formData.append('accuracy', data.accuracy);
      formData.append('deviceType', data.deviceType);
      formData.append('os', data.os);
      formData.append('browser', data.browser);
      formData.append('platform', data.platform);
      formData.append('language', data.language);
      formData.append('screenResolution', data.screenResolution);
      formData.append('userAgent', data.rawUserAgent);

      await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: formData.toString()
      });
    }

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    function clearStatus() {
      statusBox.textContent = '';
      statusBox.className = 'status';
    }

    function resetButton() {
      submitBtn.disabled = false;
      submitBtn.textContent = t('submitBtn');
    }

    setLanguage('th');
  </script>
</body>
</html>
