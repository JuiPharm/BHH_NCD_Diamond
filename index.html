<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>บันทึกข้อมูลตำแหน่ง</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f5e9, #e3f2fd);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.12);
      padding: 28px;
      text-align: center;
    }

    .logo {
      width: 110px;
      height: 110px;
      object-fit: contain;
      margin-bottom: 12px;
      border-radius: 20px;
    }

    h1 {
      margin: 8px 0 6px;
      font-size: 24px;
      color: #1b5e20;
    }

    p {
      color: #555;
      font-size: 15px;
      line-height: 1.6;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 16px;
      font-weight: bold;
      color: #333;
    }

    input[type="text"] {
      width: 100%;
      padding: 13px 14px;
      margin-top: 7px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 16px;
    }

    .choice {
      margin-top: 12px;
      text-align: left;
      background: #f7f9fb;
      padding: 12px;
      border-radius: 12px;
    }

    .choice label {
      margin: 8px 0;
      font-weight: normal;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .hint {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
      text-align: left;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #2e7d32;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      display: none;
      font-size: 14px;
      line-height: 1.5;
    }

    .success {
      display: block;
      background: #e8f5e9;
      color: #1b5e20;
    }

    .error {
      display: block;
      background: #ffebee;
      color: #b71c1c;
    }

    .loading {
      display: block;
      background: #fff8e1;
      color: #795548;
    }
  </style>
</head>

<body>
  <div class="card">
    <img
      class="logo"
      src="https://lh3.googleusercontent.com/d/1r7PM1ogHIbxskvcauVIYaQOfSHXWGncO=w240"
      alt="Logo"
    />

    <h1>บันทึกข้อมูลตำแหน่ง</h1>
    <p>กรุณากรอกข้อมูลและเลือกความยินยอมก่อนส่งข้อมูล</p>

    <form id="locationForm">
      <label>ชื่อ</label>
      <input type="text" id="firstName" required placeholder="กรอกชื่อ" />

      <label>นามสกุล</label>
      <input type="text" id="lastName" required placeholder="กรอกนามสกุล" />

      <label>ความยินยอม</label>
      <div class="choice">
        <label>
          <input type="radio" name="consent" value="ยินยอม" required />
          ยินยอมให้บันทึกตำแหน่ง
        </label>

        <label>
          <input type="radio" name="consent" value="ไม่ยินยอม" required />
          ไม่ยินยอมให้บันทึกตำแหน่ง
        </label>
      </div>

      <label>ระดับความแม่นยำ</label>
      <div class="choice">
        <label>
          <input type="radio" name="accuracyMode" value="เร็ว" checked />
          เร็วขึ้น เหมาะกับการใช้งานทั่วไป
        </label>

        <label>
          <input type="radio" name="accuracyMode" value="แม่นยำสูง" />
          แม่นยำสูง ใช้ GPS ละเอียดขึ้น แต่อาจใช้เวลานานกว่า
        </label>
      </div>

      <div class="hint">
        แนะนำ: หากอยู่กลางแจ้งและเปิด GPS จะได้ตำแหน่งแม่นยำกว่า
      </div>

      <button type="submit" id="submitBtn">ส่งข้อมูล</button>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyOi97FkTX8EQ-riUkm3rCL0jET2P6iJWyntOcmP1ACOavxUM5LFMz8PH_D2Ctkc4RV8g/exec';

    const form = document.getElementById('locationForm');
    const statusBox = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function (event) {
      event.preventDefault();

      clearStatus();
      submitBtn.disabled = true;

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const consent = document.querySelector('input[name="consent"]:checked')?.value;
      const accuracyMode = document.querySelector('input[name="accuracyMode"]:checked')?.value;

      if (!firstName || !lastName || !consent) {
        showStatus('กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
        resetButton();
        return;
      }

      if (consent === 'ไม่ยินยอม') {
        submitBtn.textContent = 'กำลังบันทึก...';

        await submitToGoogleSheet({
          firstName,
          lastName,
          consent,
          accuracyMode: '',
          latitude: '',
          longitude: '',
          accuracy: ''
        });

        showStatus('บันทึกข้อมูลเรียบร้อย: ผู้ใช้ไม่ยินยอมให้บันทึกตำแหน่ง', 'success');
        form.reset();
        resetButton();
        return;
      }

      if (!navigator.geolocation) {
        showStatus('อุปกรณ์นี้ไม่รองรับการระบุตำแหน่ง', 'error');
        resetButton();
        return;
      }

      submitBtn.textContent = 'กำลังค้นหาตำแหน่ง...';

      const geoOptions = getGeoOptions(accuracyMode);

      navigator.geolocation.getCurrentPosition(
        async function (position) {
          submitBtn.textContent = 'กำลังบันทึก...';

          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;
          const accuracy = position.coords.accuracy;

          await submitToGoogleSheet({
            firstName,
            lastName,
            consent,
            accuracyMode,
            latitude,
            longitude,
            accuracy
          });

          showStatus(
            `บันทึกข้อมูลตำแหน่งเรียบร้อย ความคลาดเคลื่อนประมาณ ${Math.round(accuracy)} เมตร`,
            'success'
          );

          form.reset();
          resetButton();
        },
        async function (error) {
          let message = 'ไม่สามารถดึงตำแหน่งได้';

          if (error.code === error.PERMISSION_DENIED) {
            message = 'ผู้ใช้ไม่อนุญาตให้เข้าถึงตำแหน่ง';
          } else if (error.code === error.TIMEOUT) {
            message = 'ค้นหาตำแหน่งไม่ทันเวลา กรุณาลองอีกครั้ง หรือเลือกโหมดเร็ว';
          } else if (error.code === error.POSITION_UNAVAILABLE) {
            message = 'ไม่พบสัญญาณตำแหน่ง กรุณาเปิด GPS หรือย้ายไปพื้นที่โล่ง';
          }

          showStatus(message, 'error');
          resetButton();
        },
        geoOptions
      );
    });

    function getGeoOptions(mode) {
      if (mode === 'แม่นยำสูง') {
        return {
          enableHighAccuracy: true,
          timeout: 12000,
          maximumAge: 0
        };
      }

      return {
        enableHighAccuracy: false,
        timeout: 5000,
        maximumAge: 60000
      };
    }

    async function submitToGoogleSheet(data) {
      const formData = new URLSearchParams();

      formData.append('firstName', data.firstName);
      formData.append('lastName', data.lastName);
      formData.append('consent', data.consent);
      formData.append('accuracyMode', data.accuracyMode);
      formData.append('latitude', data.latitude);
      formData.append('longitude', data.longitude);
      formData.append('accuracy', data.accuracy);
      formData.append('userAgent', navigator.userAgent);

      await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: formData.toString()
      });
    }

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    function clearStatus() {
      statusBox.textContent = '';
      statusBox.className = 'status';
    }

    function resetButton() {
      submitBtn.disabled = false;
      submitBtn.textContent = 'ส่งข้อมูล';
    }
  </script>
</body>
</html>
